<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist - Бъдещето на обслужването</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Spline CDN preconnect — browser establishes connection immediately -->
  <link rel="preconnect" href="https://prod.spline.design" crossorigin>
  <link rel="dns-prefetch" href="https://prod.spline.design">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Oswald:wght@500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            display: ['Oswald', 'sans-serif'],
          },
          colors: {
            obsidian: {
              900: '#050505',
              800: '#111111',
              700: '#1a1a1a',
            },
            accent: {
              blue: '#0044FF',
              orange: '#FF3300'
            },
            offwhite: '#F4F4F0',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'wave': 'wave 1.2s ease-in-out infinite',
          },
          keyframes: {
            glow: {
              '0%': { boxShadow: '0 0 5px #22d3ee, 0 0 10px #22d3ee' },
              '100%': { boxShadow: '0 0 10px #22d3ee, 0 0 20px #22d3ee' },
            },
            wave: {
              '0%, 100%': { height: '10%' },
              '50%': { height: '100%' },
            }
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: var(--bg-color, #F4F4F0);
      color: var(--text-color, #050505);
      transition: background-color 0.8s ease, color 0.8s ease;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      background: transparent;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #0044FF;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }

    .dark {
      --background: #050505;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
